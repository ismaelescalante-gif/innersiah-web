<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias — Innersiah Group</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    color: #f5f5f0;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .logo { height: 45px; width: auto; margin-bottom: 3rem; }
  .icon {
    width: 72px; height: 72px;
    background: rgba(126,236,212,0.1);
    border: 1px solid rgba(126,236,212,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 2rem;
    font-size: 2rem;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }
  h1 span { color: #7EECD4; }
  p {
    color: #888;
    font-size: 1.05rem;
    line-height: 1.7;
    max-width: 440px;
    margin: 0 auto 2.5rem;
    font-weight: 300;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #7EECD4;
    color: #080808;
    padding: 14px 28px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 0.95rem;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
</style>
</head>
<body>
  <img src="https://res.cloudinary.com/de2t5oifa/image/upload/q_auto/f_auto/v1779391966/logo_innersiah_ro1d58.svg" alt="Innersiah" class="logo">
  <div class="icon">✓</div>
  <h1>¡Listo,<br><span>te contactamos!</span></h1>
  <p>Recibimos tu mensaje. Uno de nuestros fundadores te escribirá por WhatsApp en menos de 24 horas.</p>
  <a href="/" class="btn">← Volver al inicio</a>
</body>
</html>
